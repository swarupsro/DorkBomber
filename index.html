<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorized Recon Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f1e 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header with gradient */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #a0a0b0;
            font-size: 1rem;
            font-weight: 400;
        }

        /* Status pill */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .status-pill.authorized {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-pill.unauthorized {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-pill.authorized .status-dot {
            background: #10b981;
        }

        .status-pill.unauthorized .status-dot {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        /* Input section card */
        .input-card {
            background: rgba(30, 30, 46, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .input-card:hover {
            border-color: rgba(102, 126, 234, 0.3);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.2);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #b0b0c0;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 14px 18px;
            background: rgba(20, 20, 30, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .hint {
            font-size: 0.8rem;
            color: #808090;
            margin-top: 6px;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            flex: 1;
            min-width: 150px;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Recon queries section */
        .queries-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .query-card {
            background: rgba(30, 30, 46, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .query-card:hover {
            transform: translateY(-4px);
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.3);
        }

        .query-card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .query-icon {
            width: 40px;
            height: 40px;
            flex-shrink: 0;
        }

        .query-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f0f0f0;
        }

        .query-description {
            font-size: 0.85rem;
            color: #a0a0b0;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .query-preview {
            background: rgba(20, 20, 30, 0.8);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #b0b0c0;
            word-break: break-word;
            max-height: 60px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                min-width: 100%;
            }

            .queries-section {
                grid-template-columns: 1fr;
            }

            .input-card {
                padding: 20px;
            }
        }

        /* Alert message */
        .alert {
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: none;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .alert.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Authorized Recon Launcher</h1>
            <p class="subtitle">Security reconnaissance tool with domain authorization</p>
            <div id="statusPill" class="status-pill unauthorized">
                <span class="status-dot"></span>
                <span id="statusText">Not Authorized</span>
            </div>
        </header>

        <div id="alertBox" class="alert"></div>

        <div class="input-card">
            <div class="input-group">
                <label for="domainInput">Target Domains</label>
                <textarea 
                    id="domainInput" 
                    placeholder="example.com, test.example.com, demo.org"
                    rows="3"
                ></textarea>
                <p class="hint">Enter comma-separated domains. Subdomains are automatically normalized.</p>
            </div>

            <div class="button-group">
                <button class="btn-primary" id="validateBtn">Validate Domains</button>
                <button class="btn-secondary" id="copyBtn" disabled>Copy Queries</button>
                <button class="btn-secondary" id="openAllBtn" disabled>Open All</button>
            </div>
        </div>

        <div id="queriesSection" class="queries-section"></div>
    </div>

    <script>
        // Configuration: Allowed domains allowlist
        // Only these domains (and their subdomains) are authorized for reconnaissance
        const ALLOWED_DOMAINS = [
            'example.com',
            'test.com',
            'demo.org'
        ];

        // Safe reconnaissance search query templates
        // {SITES} will be replaced with the normalized domain list
        const RECON_TEMPLATES = [
            {
                title: 'Subdomain Finder',
                description: 'Find subdomains and related sites',
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <circle cx="12" cy="12" r="6"></circle>
                    <circle cx="12" cy="12" r="2"></circle>
                </svg>`,
                query: 'site:{SITES}'
            },
            {
                title: 'Directory Listing',
                description: 'Search for exposed directories',
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                </svg>`,
                query: 'site:{SITES} intitle:"index of"'
            },
            {
                title: 'Login Pages',
                description: 'Locate authentication endpoints',
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="5" y="11" width="14" height="10" rx="2" ry="2"></rect>
                    <circle cx="12" cy="16" r="1"></circle>
                    <path d="M8 11V7a4 4 0 118 0v4"></path>
                </svg>`,
                query: 'site:{SITES} inurl:login OR inurl:signin OR inurl:auth'
            },
            {
                title: 'Configuration Files',
                description: 'Find exposed config files',
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="12" y1="18" x2="12" y2="12"></line>
                    <line x1="9" y1="15" x2="15" y2="15"></line>
                </svg>`,
                query: 'site:{SITES} ext:xml OR ext:conf OR ext:cnf OR ext:config'
            },
            {
                title: 'Database Files',
                description: 'Search for database file exposures',
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                    <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                    <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                </svg>`,
                query: 'site:{SITES} ext:sql OR ext:db OR ext:dbf OR ext:mdb'
            },
            {
                title: 'Document Files',
                description: 'Discover document file exposures',
                icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <line x1="10" y1="9" x2="8" y2="9"></line>
                </svg>`,
                query: 'site:{SITES} ext:doc OR ext:docx OR ext:pdf OR ext:xls'
            }
        ];

        // State management
        let validatedDomains = [];
        let isAuthorized = false;
        let generatedQueries = [];

        // DOM elements
        const domainInput = document.getElementById('domainInput');
        const validateBtn = document.getElementById('validateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const openAllBtn = document.getElementById('openAllBtn');
        const statusPill = document.getElementById('statusPill');
        const statusText = document.getElementById('statusText');
        const alertBox = document.getElementById('alertBox');
        const queriesSection = document.getElementById('queriesSection');

        /**
         * Normalize a domain by removing protocol, www, and trailing slashes
         * Extracts the root domain and any subdomains
         */
        function normalizeDomain(domain) {
            // Remove protocol (http://, https://)
            let normalized = domain.replace(/^https?:\/\//, '');
            
            // Remove www. prefix
            normalized = normalized.replace(/^www\./, '');
            
            // Remove trailing slash and path
            normalized = normalized.split('/')[0];
            
            // Remove port number if present
            normalized = normalized.split(':')[0];
            
            // Trim whitespace
            normalized = normalized.trim().toLowerCase();
            
            return normalized;
        }

        /**
         * Check if a domain is authorized based on the allowlist
         * A domain is authorized if it matches an allowed domain or is a subdomain of one
         */
        function isDomainAuthorized(domain) {
            const normalized = normalizeDomain(domain);
            
            // Check if domain exactly matches or is a subdomain of allowed domains
            return ALLOWED_DOMAINS.some(allowed => {
                // Exact match
                if (normalized === allowed) return true;
                
                // Subdomain match (e.g., sub.example.com matches example.com)
                if (normalized.endsWith('.' + allowed)) return true;
                
                return false;
            });
        }

        /**
         * Parse comma-separated domain input and normalize each domain
         */
        function parseDomainInput(input) {
            return input
                .split(',')
                .map(d => d.trim())
                .filter(d => d.length > 0)
                .map(normalizeDomain);
        }

        /**
         * Display an alert message to the user
         */
        function showAlert(message, type = 'error') {
            alertBox.textContent = message;
            alertBox.className = `alert ${type} show`;
            
            // Auto-hide after 5 seconds
            setTimeout(() => {
                alertBox.classList.remove('show');
            }, 5000);
        }

        /**
         * Update the authorization status display
         */
        function updateAuthStatus(authorized) {
            isAuthorized = authorized;
            
            if (authorized) {
                statusPill.className = 'status-pill authorized';
                statusText.textContent = 'Authorized';
            } else {
                statusPill.className = 'status-pill unauthorized';
                statusText.textContent = 'Not Authorized';
            }
        }

        /**
         * Generate search queries by replacing {SITES} placeholder with domain list
         */
        function generateQueries(domains) {
            // Create site: syntax for multiple domains
            const sitesString = domains.map(d => `site:${d}`).join(' OR ');
            
            // Generate queries from templates
            return RECON_TEMPLATES.map(template => ({
                ...template,
                finalQuery: template.query.replace('{SITES}', sitesString),
                searchUrl: `https://www.google.com/search?q=${encodeURIComponent(template.query.replace('{SITES}', sitesString))}`
            }));
        }

        /**
         * Render query cards in the UI
         */
        function renderQueryCards(queries) {
            queriesSection.innerHTML = queries.map((q, index) => `
                <div class="query-card" onclick="openQuery(${index})">
                    <div class="query-card-header">
                        <div class="query-icon" style="color: #667eea;">
                            ${q.icon}
                        </div>
                        <div class="query-title">${q.title}</div>
                    </div>
                    <div class="query-description">${q.description}</div>
                    <div class="query-preview">${q.finalQuery}</div>
                </div>
            `).join('');
        }

        /**
         * Validate domains and generate queries if authorized
         */
        function validateDomains() {
            const input = domainInput.value.trim();
            
            // Check if input is empty
            if (!input) {
                showAlert('Please enter at least one domain.', 'error');
                updateAuthStatus(false);
                copyBtn.disabled = true;
                openAllBtn.disabled = true;
                queriesSection.innerHTML = '';
                return;
            }

            // Parse and normalize domains
            const domains = parseDomainInput(input);
            
            if (domains.length === 0) {
                showAlert('No valid domains found in input.', 'error');
                updateAuthStatus(false);
                copyBtn.disabled = true;
                openAllBtn.disabled = true;
                queriesSection.innerHTML = '';
                return;
            }

            // Check authorization for all domains
            const unauthorizedDomains = domains.filter(d => !isDomainAuthorized(d));
            
            if (unauthorizedDomains.length > 0) {
                showAlert(`Unauthorized domains detected: ${unauthorizedDomains.join(', ')}. Only authorized domains are allowed.`, 'error');
                updateAuthStatus(false);
                copyBtn.disabled = true;
                openAllBtn.disabled = true;
                queriesSection.innerHTML = '';
                return;
            }

            // All domains authorized - proceed
            validatedDomains = domains;
            generatedQueries = generateQueries(validatedDomains);
            
            updateAuthStatus(true);
            showAlert(`${domains.length} domain(s) validated and authorized successfully!`, 'success');
            
            // Enable action buttons
            copyBtn.disabled = false;
            openAllBtn.disabled = false;
            
            // Render query cards
            renderQueryCards(generatedQueries);
        }

        /**
         * Copy all queries to clipboard
         */
        async function copyQueries() {
            if (generatedQueries.length === 0) return;
            
            const queriesText = generatedQueries
                .map(q => `${q.title}:\n${q.finalQuery}\n${q.searchUrl}`)
                .join('\n\n---\n\n');
            
            try {
                await navigator.clipboard.writeText(queriesText);
                showAlert('All queries copied to clipboard!', 'success');
            } catch (err) {
                showAlert('Failed to copy queries. Please try again.', 'error');
            }
        }

        /**
         * Open a single query in a new tab
         */
        function openQuery(index) {
            if (index < 0 || index >= generatedQueries.length) return;
            window.open(generatedQueries[index].searchUrl, '_blank');
        }

        /**
         * Open all queries in separate tabs with a delay between each
         * Delay prevents browser from blocking too many simultaneous popups
         */
        async function openAllQueries() {
            if (generatedQueries.length === 0) return;
            
            showAlert(`Opening ${generatedQueries.length} queries with 1 second delay between each...`, 'success');
            
            for (let i = 0; i < generatedQueries.length; i++) {
                // Open query in new tab
                window.open(generatedQueries[i].searchUrl, '_blank');
                
                // Wait 1 second before opening next (except for last one)
                if (i < generatedQueries.length - 1) {
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }
            }
        }

        // Event listeners
        validateBtn.addEventListener('click', validateDomains);
        copyBtn.addEventListener('click', copyQueries);
        openAllBtn.addEventListener('click', openAllQueries);
        
        // Allow Enter key to trigger validation
        domainInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                validateDomains();
            }
        });
    </script>
</body>
</html>
